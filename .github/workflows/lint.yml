name: Lint

on:
  push:
    branches-ignore:
      - main

# Security: restrict GITHUB_TOKEN to least privilege.
# See: https://www.upwind.io/feed/hackerbot-claw-github-actions-pull-request-rce
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate terraform configuration
    strategy:
      fail-fast: false
      matrix:
        path: ["cg_space", "clamav", "database", "domain", "redis", "s3", "egress_proxy", "drupal", "spiffworkflow", "application"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: terraform validate ${{ matrix.path }}
        uses: dflook/terraform-validate@v1
        with:
          path: ${{ matrix.path }}

  fmt-check:
    runs-on: ubuntu-latest
    name: Check formatting of terraform files
    strategy:
      fail-fast: false
      matrix:
        path: ["cg_space", "clamav", "database", "domain", "redis", "s3", "egress_proxy", "drupal", "spiffworkflow", "application"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: terraform fmt ${{ matrix.path }}
        uses: dflook/terraform-fmt-check@v1
        with:
          path: ${{ matrix.path }}
